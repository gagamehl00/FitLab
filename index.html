];

/* ============================ HELPERS ============================ */
const STORAGE_KEY = "elds_fitplan_v1";
const pad = (n)=> String(n).padStart(2,"0");
const toISO = (d)=> `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayISO = ()=> toISO(new Date());
const parseISO = (s)=>{ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const addDays = (iso,n)=>{ const d=parseISO(iso); d.setDate(d.getDate()+n); return toISO(d); };
const daysBetween = (a,b)=> Math.round((parseISO(b)-parseISO(a))/86400000);
const WD = ["So","Mo","Di","Mi","Do","Fr","Sa"];
const fmtDate = (iso)=>{ const d=parseISO(iso); return `${WD[d.getDay()]}, ${d.getDate()}.${d.getMonth()+1}.`; };

function defaultState(){ return { startDate: todayISO(), weekOverride:null, settings:{ theme:"dark", notif:false, lastNotif:null }, days:{} }; }
function loadState(){ try{ const r=localStorage.getItem(STORAGE_KEY); if(r){ const s=JSON.parse(r); return { ...defaultState(), ...s, settings:{...defaultState().settings, ...(s.settings||{})} }; } }catch(e){} return defaultState(); }

// Standard-Wochenplan: Mo=A, Mi=B, Fr=C, So=Lauf
function defaultSession(iso){ const d=parseISO(iso).getDay(); return ({1:"A",3:"B",5:"C",0:"run"})[d] || null; }
function effSession(state, iso){ const o = state.days[iso] && state.days[iso].overrideType; if(o!==undefined && o!==null) return o==="rest"? null : o; return defaultSession(iso); }
function blankDay(){ return { type:null, ex:{}, done:false, warmup:{}, cooldown:{}, meals:{}, supps:{whey:0}, run:false, overrideType:null }; }
function getDay(state, iso){ return state.days[iso] || blankDay(); }

function currentWeek(state){
  if(state.weekOverride) return state.weekOverride;
  const w = Math.floor(daysBetween(state.startDate, todayISO())/7)+1;
  return Math.min(12, Math.max(1, w));
}

function Ring({pct,size=130,stroke=12,children}){

    <div className="relative inline-flex items-center justify-center" style={{width:size,height:size}}>

        <circle className="ring-fill" cx={size/2} cy={size/2} r={r} fill="none" strokeWidth={stroke} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}/>

/* ============================ LINE CHART (SVG) ============================ */
function LineChart({points}){
  if(points.length<1) return <div className="text-sm py-8 text-center" style={{color:"var(--muted)"}}>Noch keine Daten – trag Gewichte im Training ein.</div>;
  const W=320,H=140,P=24;
  const ys=points.map(p=>p.y), min=Math.min(...ys), max=Math.max(...ys);
  const span=(max-min)||1;
  const X=(i)=> points.length===1? W/2 : P+(i*(W-2*P))/(points.length-1);
  const Y=(v)=> H-P-((v-min)/span)*(H-2*P);
  const path=points.map((p,i)=>`${i===0?"M":"L"}${X(i)},${Y(p.y)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full">
      <line x1={P} y1={H-P} x2={W-P} y2={H-P} stroke="var(--border)"/>
      <path d={path} fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {points.map((p,i)=><circle key={i} cx={X(i)} cy={Y(p.y)} r="3.5" fill="var(--accent)"/>)}
      <text x={P} y={14} fontSize="11" fill="var(--muted)">{max} kg</text>
      <text x={P} y={H-P+16} fontSize="11" fill="var(--muted)">{min} kg</text>
    </svg>
  );
}

/* ============================ APP ============================ */
function App(){
  const [state,setState]=useState(loadState);
  const [tab,setTab]=useState("home");
  const iso=todayISO();

  useEffect(()=>{ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }catch(e){} },[state]);
  useEffect(()=>{ document.documentElement.setAttribute("data-theme",state.settings.theme); },[state.settings.theme]);

  // Update-Helfer für einen Tag
  const update=(fn)=> setState(s=>{ const ns=structuredCloneSafe(s); fn(ns); return ns; });
  const updDay=(dayIso,fn)=> update(s=>{ if(!s.days[dayIso]) s.days[dayIso]=blankDay(); fn(s.days[dayIso],s); });

  const week=currentWeek(state); const block=blockFor(week);
  const session=effSession(state,iso);

  // verpasste Einheiten (letzte 21 Tage)
  const missed=useMemo(()=>{ const out=[]; for(let i=21;i>=1;i--){ const d=addDays(iso,-i); if(daysBetween(state.startDate,d)<0) continue; const ses=effSession(state,d); if(!ses) continue; const day=state.days[d]; const done=ses==="run"? (day&&day.run):(day&&day.done); if(!done) out.push({date:d,type:ses}); } return out; },[state,iso]);

  // Tages-Score fürs Dashboard
  const day=getDay(state,iso);
  const dayScore=useMemo(()=>{
    const items=[];
    if(session==="run"){ items.push(day.run); }
    else if(session){ items.push(day.done); items.push(PLAN.warmup.every(w=>day.warmup[w.id])); }
    items.push(["m1","m4","m6"].every(m=>day.meals[m])); // 3 Hauptmahlzeiten
    items.push(!!day.supps.creatine);
    const done=items.filter(Boolean).length; return items.length? done/items.length:0;
  },[day,session]);

  // Benachrichtigung (best effort, nur bei geöffneter App)
  useEffect(()=>{
    if(!state.settings.notif) return;
    const t=setInterval(()=>{
      const h=new Date().getHours();
      if(h>=18 && state.settings.lastNotif!==iso && !getDay(state,iso).supps.creatine){
        if(window.Notification && Notification.permission==="granted"){
          new Notification("FitPlan",{body:"Kreatin heute noch nicht abgehakt 💊"});
          update(s=>{s.settings.lastNotif=iso;});
        }
      }
    },60000);
    return ()=>clearInterval(t);
  },[state.settings.notif,state.settings.lastNotif]);

  const ctx={state,setState,update,updDay,iso,week,block,session,missed,dayScore,setTab};

  return (
    <div className="min-h-screen pb-24" style={{maxWidth:520,margin:"0 auto"}}>
      <TopBar state={state} update={update}/>
      <main className="px-4">
        {tab==="home" && <Dashboard {...ctx}/>}
        {tab==="train" && <Training {...ctx}/>}
        {tab==="progress" && <Progress {...ctx}/>}
        {tab==="nutri" && <Nutrition {...ctx}/>}
        {tab==="supps" && <Supps {...ctx}/>}
      </main>
      <BottomNav tab={tab} setTab={setTab}/>
    </div>
  );
}
function structuredCloneSafe(o){ return JSON.parse(JSON.stringify(o)); }

          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text)" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
        </button>
        {menu && <div className="absolute right-0 mt-2 w-52 rounded-2xl border p-1.5 z-30 fade-in" style={{background:"var(--surface)",borderColor:"var(--border)"}} onMouseLeave={()=>setMenu(false)}>
          {[["Hell/Dunkel",toggleTheme],["Daten exportieren",exportData],["Daten importieren",()=>fileRef.current.click()],["Zurücksetzen",reset]].map(([l,fn])=>(
            <button key={l} onClick={()=>{fn();if(l!=="Daten importieren")setMenu(false);}} className="w-full text-left px-3 py-2.5 rounded-xl text-sm hover:opacity-80" style={{color:l==="Zurücksetzen"?"#ff5b5b":"var(--text)"}}>{l}</button>

function Training({state,update,updDay,iso,week,block,session,missed}){
  const active = session && session!=="run" ? session : "A";
  const [sel,setSel]=useState(active);
  const day=getDay(state,iso);
  const wo=PLAN.workouts[sel];
  const isToday = effSession(state,iso)===sel;

  const setType=(t)=>{ setSel(t); update(s=>{ if(!s.days[iso]) s.days[iso]=blankDay(); s.days[iso].overrideType=t; }); };
  const toggleEx=(id)=> updDay(iso,d=>{ if(!d.ex[id]) d.ex[id]={w:"",r:"",done:false}; d.ex[id].done=!d.ex[id].done; });
  const setField=(id,k,v)=> updDay(iso,d=>{ if(!d.ex[id]) d.ex[id]={w:"",r:"",done:false}; d.ex[id][k]=v; });
  const finish=()=> updDay(iso,d=>{ wo.exercises.forEach(e=>{ if(!d.ex[e.id]) d.ex[e.id]={w:"",r:"",done:true}; else d.ex[e.id].done=true; }); d.done=true; });

  const doneN=wo.exercises.filter(e=>day.ex[e.id]&&day.ex[e.id].done).length;

  return (
    <div className="space-y-4 fade-in">
      <div className="pt-1 flex items-end justify-between">
        <div><div className="text-2xl font-extrabold tracking-tight">Training</div><div className="text-sm" style={{color:"var(--muted)"}}>Woche {week} · {block.rir}</div></div>
      </div>

      <div className="flex gap-2">
        {["A","B","C"].map(t=>(
          <button key={t} onClick={()=>setType(t)} className="flex-1 py-3 rounded-2xl font-bold transition-all"
            style={{background: sel===t?"var(--accent)":"var(--surface)", color:sel===t?"#0b0b0d":"var(--text)", border:`1px solid ${sel===t?"transparent":"var(--border)"}`}}>
            {t}{effSession(state,iso)===t && sel!==t?" •":""}
          </button>
        ))}
      </div>
      <div className="text-xs -mt-2" style={{color:"var(--muted)"}}>{isToday?"Heutige Einheit":"Als heutige Einheit gewählt (Plan passt sich an)"} · {wo.name} · {doneN}/{wo.exercises.length}</div>

      {missed.length>0 && <MissedList state={state} update={update} updDay={updDay} missed={missed}/>}

      <Section title="Aufwärmen & Mobility">
        {PLAN.warmup.map(w=>(
          <Row key={w.id} checked={!!day.warmup[w.id]} onToggle={()=>updDay(iso,d=>{d.warmup[w.id]=!d.warmup[w.id];})}>
            <span className="text-sm">{w.label}</span>
          </Row>
        ))}
      </Section>

      <Section title="Übungen">
        {wo.exercises.map((e,i)=>(
          <ExerciseRow key={e.id} idx={i+1} ex={e} block={block} data={day.ex[e.id]||{}}
            onToggle={()=>toggleEx(e.id)} onField={(k,v)=>setField(e.id,k,v)}/>
        ))}
      </Section>

      <Section title="Cool-down">
        {PLAN.cooldown.map(c=>(
          <Row key={c.id} checked={!!day.cooldown[c.id]} onToggle={()=>updDay(iso,d=>{d.cooldown[c.id]=!d.cooldown[c.id];})}>
            <span className="text-sm">{c.label}</span>
          </Row>
        ))}
      </Section>

      <button onClick={finish} className="w-full py-4 rounded-2xl font-extrabold text-lg active:scale-[.98]" style={{background:day.done?"var(--good)":"var(--accent)",color:"#0b0b0d"}}>
        {day.done?"✓ Training abgeschlossen":"Training abschließen"}
      </button>
    </div>
  );
}

function ExerciseRow({idx,ex,block,data,onToggle,onField}){
  const [open,setOpen]=useState(false);
  return (
    <div className="rounded-2xl p-3" style={{background:"var(--surface2)"}}>
      <div className="flex items-start gap-3">
        <CheckButton checked={!!data.done} onClick={onToggle}/>
        <div className="flex-1 min-w-0" onClick={()=>setOpen(o=>!o)}>
          <div className="font-semibold leading-tight">{idx}. {ex.name}</div>
          <div className="text-xs mt-0.5 tnum" style={{color:"var(--muted)"}}>{ex.sets} × {ex.reps} · {block.rir} · Pause {ex.pause}</div>
          {open && <div className="text-xs mt-1.5" style={{color:"var(--muted)"}}>💡 {ex.detail}</div>}
        </div>
      </div>
      <div className="flex gap-2 mt-2.5 pl-11">
        <LabeledInput label="kg" value={data.w||""} onChange={v=>onField("w",v)}/>
        <LabeledInput label="Wdh" value={data.r||""} onChange={v=>onField("r",v)}/>
      </div>
    </div>
  );
}
function LabeledInput({label,value,onChange}){
  return (
    <div className="flex-1 flex items-center gap-2 rounded-xl px-3 py-2" style={{background:"var(--surface)",border:"1px solid var(--border)"}}>
      <span className="text-xs font-semibold" style={{color:"var(--muted)"}}>{label}</span>
      <input type="number" inputMode="decimal" value={value} onChange={e=>onChange(e.target.value)} placeholder="—"
        className="w-full bg-transparent outline-none text-base font-bold tnum" style={{color:"var(--text)"}}/>
    </div>
  );
}

function MissedList({state,update,updDay,missed}){
  return (
    <Section title="Verpasst">
      {missed.map(m=>(
        <div key={m.date} className="rounded-2xl p-3 flex items-center gap-3" style={{background:"var(--surface2)"}}>
          <div className="flex-1"><div className="font-semibold text-sm">{m.type==="run"?"Lauftag":PLAN.workouts[m.type].name}</div><div className="text-xs" style={{color:"var(--muted)"}}>{fmtDate(m.date)}</div></div>
          <button onClick={()=>updDay(m.date,d=>{ if(m.type==="run") d.run=true; else d.done=true; })} className="text-xs font-semibold px-3 py-2 rounded-xl" style={{background:"var(--good-soft)",color:"var(--good)"}}>Erledigt</button>
          <button onClick={()=>update(s=>{ if(!s.days[m.date]) s.days[m.date]=blankDay(); s.days[m.date].overrideType="rest"; })} className="text-xs px-3 py-2 rounded-xl" style={{background:"var(--surface)"}}>Streichen</button>
        </div>
      ))}
    </Section>
  );
}

const Section=({title,children})=>(
  <div><div className="text-sm font-bold mb-2 px-1" style={{color:"var(--muted)"}}>{title}</div><div className="space-y-2">{children}</div></div>
);
const Row=({checked,onToggle,children})=>(
  <div className="rounded-2xl p-3 flex items-center gap-3" style={{background:"var(--surface2)"}}>
    <CheckButton checked={checked} onClick={onToggle}/><div className="flex-1">{children}</div>
  </div>
);

/* ============================ PROGRESS ============================ */
function Progress({state}){
  const allEx=useMemo(()=>{ const m=new Map(); Object.values(PLAN.workouts).forEach(w=>w.exercises.forEach(e=>m.set(e.id,e.name))); return m; },[]);
  const [exId,setExId]=useState("a1");
  const history=useMemo(()=>{
    const out=[]; Object.entries(state.days).forEach(([d,day])=>{ const e=day.ex&&day.ex[exId]; if(e&&e.w!==""&&e.w!=null&&!isNaN(parseFloat(e.w))) out.push({date:d,w:parseFloat(e.w),r:e.r}); });
    out.sort((a,b)=>a.date<b.date?-1:1); return out;
  },[state,exId]);
  const points=history.map(h=>({y:h.w}));
  const improve = history.length>=2 ? history[history.length-1].w-history[0].w : 0;

  const totalWorkouts=Object.values(state.days).filter(d=>d.done).length;
  const totalRuns=Object.values(state.days).filter(d=>d.run).length;

  return (
    <div className="space-y-4 fade-in">
      <div className="pt-1"><div className="text-2xl font-extrabold tracking-tight">Fortschritt</div><div className="text-sm" style={{color:"var(--muted)"}}>Kraftentwicklung & Historie</div></div>

      <div className="grid grid-cols-2 gap-3">
        <Card className="!p-4 text-center"><div className="text-3xl font-extrabold tnum">{totalWorkouts}</div><div className="text-xs" style={{color:"var(--muted)"}}>Trainings absolviert</div></Card>
        <Card className="!p-4 text-center"><div className="text-3xl font-extrabold tnum">{totalRuns}</div><div className="text-xs" style={{color:"var(--muted)"}}>Läufe absolviert</div></Card>
      </div>

      <Card>
        <div className="font-bold mb-2">Kraftverlauf</div>
        <select value={exId} onChange={e=>setExId(e.target.value)} className="w-full rounded-xl px-3 py-2.5 text-sm font-medium mb-3 outline-none" style={{background:"var(--surface2)",color:"var(--text)",border:"1px solid var(--border)"}}>
          {[...allEx.entries()].map(([id,name])=><option key={id} value={id}>{name}</option>)}
        </select>
        <LineChart points={points}/>
        {history.length>=2 && <div className="mt-2 text-sm text-center">Veränderung: <span className="font-bold" style={{color:improve>=0?"var(--good)":"#ff5b5b"}}>{improve>=0?"+":""}{improve} kg</span></div>}
      </Card>

      <Card>
        <div className="font-bold mb-2">Letzte Einträge</div>
        {history.length===0 ? <div className="text-sm py-4 text-center" style={{color:"var(--muted)"}}>Noch keine Einträge.</div> :
          <div className="space-y-1.5">{[...history].reverse().slice(0,8).map((h,i)=>(
            <div key={i} className="flex justify-between text-sm py-1.5 px-1 rounded-lg"><span style={{color:"var(--muted)"}}>{fmtDate(h.date)}</span><span className="font-bold tnum">{h.w} kg{h.r?` × ${h.r}`:""}</span></div>
          ))}</div>}
      </Card>
    </div>
  );
}

/* ============================ NUTRITION ============================ */
function sumNutrition(day){ let kcal=0,p=0,f=0,c=0; PLAN.nutrition.meals.forEach(m=>{ if(day.meals&&day.meals[m.id]){ kcal+=m.kcal;p+=m.p;f+=m.f;c+=m.c; } }); return {kcal,p,f,c}; }

function Nutrition({state,updDay,iso}){
  const day=getDay(state,iso); const n=sumNutrition(day); const t=PLAN.nutrition.targets;
  return (
    <div className="space-y-4 fade-in">
      <div className="pt-1"><div className="text-2xl font-extrabold tracking-tight">Ernährung</div><div className="text-sm" style={{color:"var(--muted)"}}>Leanbulk · {fmtDate(iso)}</div></div>
      <Card className="space-y-3">
        <Bar label="Kalorien" value={n.kcal} target={t.kcal} unit=" kcal"/>
        <Bar label="Protein" value={n.p} target={t.protein} unit=" g"/>
        <Bar label="Fett" value={n.f} target={t.fat} unit=" g"/>
        <Bar label="Kohlenhydrate" value={n.c} target={t.carbs} unit=" g"/>
        <div className="text-xs pt-1" style={{color:"var(--muted)"}}>Mahlzeiten sind Beispiele – abhaken zählt grob mit. Portionen an deine Zielwerte anpassen.</div>
      </Card>
      <Section title="Mahlzeiten">
        {PLAN.nutrition.meals.map(m=>(
          <div key={m.id} className="rounded-2xl p-3 flex items-center gap-3" style={{background:"var(--surface2)"}}>
            <CheckButton checked={!!day.meals[m.id]} onClick={()=>updDay(iso,d=>{d.meals[m.id]=!d.meals[m.id];})}/>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2"><span className="font-bold text-sm">{m.slot}</span><span className="text-xs tnum" style={{color:"var(--muted)"}}>{m.kcal} kcal · {m.p}g P</span></div>
              <div className="text-xs mt-0.5 truncate" style={{color:"var(--muted)"}}>{m.food}</div>
            </div>
          </div>
        ))}
      </Section>
    </div>
  );
}

/* ============================ SUPPLEMENTS ============================ */
function Supps({state,update,updDay,iso}){
  const day=getDay(state,iso);
  const enableNotif=async()=>{ if(!window.Notification){ alert("Benachrichtigungen werden in diesem Browser nicht unterstützt."); return;} const p=await Notification.requestPermission(); update(s=>{ s.settings.notif = p==="granted"; }); if(p!=="granted") alert("Erinnerungen blockiert – im Browser erlauben."); };
  return (
    <div className="space-y-4 fade-in">
      <div className="pt-1"><div className="text-2xl font-extrabold tracking-tight">Supplemente</div><div className="text-sm" style={{color:"var(--muted)"}}>{fmtDate(iso)}</div></div>
      <Section title="Heute">
        {PLAN.supplements.map(s=>(
          <div key={s.id} className="rounded-2xl p-3 flex items-center gap-3" style={{background:"var(--surface2)"}}>
            <div className="flex-1 min-w-0"><div className="font-bold text-sm">{s.name} <span className="font-normal tnum" style={{color:"var(--muted)"}}>· {s.dose}</span></div><div className="text-xs mt-0.5" style={{color:"var(--muted)"}}>{s.note}</div></div>
            {s.type==="count" ? (
              <div className="flex items-center gap-1.5">
                <button onClick={()=>updDay(iso,d=>{d.supps[s.id]=Math.max(0,(d.supps[s.id]||0)-1);})} className="w-8 h-8 rounded-lg font-bold" style={{background:"var(--surface)"}}>−</button>
                <div className="w-6 text-center font-bold tnum">{day.supps[s.id]||0}</div>
                <button onClick={()=>updDay(iso,d=>{d.supps[s.id]=(d.supps[s.id]||0)+1;})} className="w-8 h-8 rounded-lg font-bold" style={{background:"var(--accent)",color:"#0b0b0d"}}>+</button>
              </div>
            ) : (
              <CheckButton checked={!!day.supps[s.id]} onClick={()=>updDay(iso,d=>{d.supps[s.id]=!d.supps[s.id];})} size={34}/>
            )}
          </div>
        ))}
      </Section>
      <Card className="flex items-center gap-3">
        <div className="flex-1"><div className="font-bold text-sm">Tägliche Erinnerung</div><div className="text-xs" style={{color:"var(--muted)"}}>Hinweis am Abend, falls Kreatin offen (nur bei geöffneter App)</div></div>
        <button onClick={enableNotif} className="text-sm font-semibold px-3 py-2 rounded-xl" style={{background:state.settings.notif?"var(--good-soft)":"var(--accent-soft)",color:state.settings.notif?"var(--good)":"var(--accent)"}}>{state.settings.notif?"Aktiv ✓":"Aktivieren"}</button>
      </Card>
    </div>
  );
}

/* ============================ BOTTOM NAV ============================ */
function BottomNav({tab,setTab}){
  const items=[["home","Heute","home"],["train","Training","dumbbell"],["progress","Fortschritt","chart"],["nutri","Ernährung","fork"],["supps","Supps","pill"]];
  return (
    <nav className="fixed bottom-0 left-0 right-0 z-20 border-t" style={{background:"var(--surface)",borderColor:"var(--border)",paddingBottom:"env(safe-area-inset-bottom)"}}>
      <div className="flex" style={{maxWidth:520,margin:"0 auto"}}>
        {items.map(([k,label,icon])=>(
          <button key={k} onClick={()=>setTab(k)} className="flex-1 flex flex-col items-center gap-1 py-2.5 active:scale-95 transition-transform">
            <Icon name={icon} size={24} active={tab===k}/>
            <span className="text-[10px] font-semibold" style={{color:tab===k?"var(--accent)":"var(--muted)"}}>{label}</span>
          </button>
        ))}
      </div>
    </nav>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
